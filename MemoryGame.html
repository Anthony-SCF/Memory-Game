<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Game – Fixed</title>

<style>
.game-container {
    display: grid;
    grid-template-columns: repeat(4, 100px);
    gap: 12px;
    margin: 20px auto;
}

.card {
    width: 100px;
    height: 100px;
    background-color: #6c5ce7;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    cursor: pointer;
    border-radius: 10px;
}

.card.flipped { background-color: #a29bfe; }
.card.matched {
    background-color: #55efc4;
    cursor: default;
}

#score {
    text-align: center;
    font-size: 24px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div id="score">Score: <span id="scoreValue">0</span></div>
<div class="game-container" id="gameContainer"></div>

<script>
window.addEventListener("load", initializeGame);
window.addEventListener("load", setupEventListeners);

let score = 0;
let flippedCards = [];
let lockBoard = false;

const cardSymbols = [
    '😎','😎','🎧','🎧','🧠','🧠','🔥','🔥',
    '🚀','🚀','🍕','🍕','🎮','🎮','⚡','⚡'
];

function initializeGame() {
    const container = document.getElementById('gameContainer');
    const shuffled = [...cardSymbols].sort(() => Math.random() - 0.5);

    shuffled.forEach(symbol => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.symbol = symbol;
        container.appendChild(card);
    });
}

function setupEventListeners() {
    document.getElementById('gameContainer')
        .addEventListener('click', handleCardClick);
}

function handleCardClick(event) {
    const card = event.target;

    if (!card.classList.contains('card') ||
        card.classList.contains('flipped') ||
        card.classList.contains('matched') ||
        lockBoard) return;

    card.textContent = card.dataset.symbol;
    card.classList.add('flipped');
    flippedCards.push(card);

    if (flippedCards.length === 2) checkForMatch();
}

function checkForMatch() {
    lockBoard = true;
    const [c1, c2] = flippedCards;

    if (c1.dataset.symbol === c2.dataset.symbol) {
        c1.classList.add('matched');
        c2.classList.add('matched');
        score++;
        document.getElementById('scoreValue').textContent = score;
        resetBoard();
        checkWin();
    } else {
        setTimeout(() => {
            c1.textContent = '';
            c2.textContent = '';
            c1.classList.remove('flipped');
            c2.classList.remove('flipped');
            resetBoard();
        }, 800);
    }
}

function resetBoard() {
    flippedCards = [];
    lockBoard = false;
}

function checkWin() {
    if (document.querySelectorAll('.matched').length === cardSymbols.length) {
        alert("🎉 You won!");
        document.getElementById('gameContainer').style.pointerEvents = "none";
    }
}
</script>

</body>
</html>
